<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>मदीना मस्जिद चेक रिकॉर्ड - Responsive Wide Table</title>
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0; padding: 0 20px;
    background: #f9f9f9; color: #333;
}
h2 { text-align:center; color:#2c3e50; margin-top:20px; }
input, select { padding:10px; margin:5px; border-radius:5px; border:1px solid #ccc; }
button { padding:10px 15px; border:none; border-radius:5px; background:#3498db; color:white; cursor:pointer; }
button:hover { background:#2980b9; }

#topControls { text-align:center; margin-top:15px; }
#recordsContainer { overflow-x: auto; margin-top: 20px; }

table {
    width: 100%; border-collapse: collapse; min-width: 900px; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
th, td { border:1px solid #ddd; padding:8px; text-align:center; }
th { background:#3498db; color:white; position: sticky; top: 0; }
tr:nth-child(even) { background:#f2f2f2; }

footer { text-align:center; padding:15px; background-color:#0b3d2e; color:white; margin-top:40px; width:100%; box-sizing:border-box;}
</style>
</head>
<body>

<h2> मदीना मस्जिद चेक रिकॉर्ड</h2>

<div id="topControls">
    <input type="text" id="numberInput" placeholder="Enter Number or Mobile">
    <select id="yearSelect">
        <option value="">All Years</option>
    </select>
    <button onclick="filterRecords()">Show Record</button>
    <button onclick="goHome()">🏠 Home</button>
</div>

<div id="recordsContainer"></div>

<footer>© 2026 मदीना मस्जिद सिरसिया नं.3</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
let csvData = [];
const CSV_URL = "records.csv";

// Load CSV
Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results){
        csvData = results.data;
        populateYearOptions();
        console.log("CSV loaded:", csvData);
    },
    error: function(err){ alert("Error loading CSV: "+err);}
});

// Populate year dropdown
function populateYearOptions(){
    const years = [...new Set(csvData.map(r=>r.Year))].sort();
    const yearSelect = document.getElementById('yearSelect');
    years.forEach(y => {
        const opt = document.createElement('option'); opt.value = y; opt.textContent = y;
        yearSelect.appendChild(opt);
    });
}

// Filter and render
function filterRecords(){
    const input = document.getElementById('numberInput').value.trim();
    const selectedYear = document.getElementById('yearSelect').value;
    const container = document.getElementById('recordsContainer');
    container.innerHTML = "";

    let filtered = csvData;
    if(input) filtered = filtered.filter(r => r.Number === input || r.Mobile === input);
    if(selectedYear) filtered = filtered.filter(r => r.Year === selectedYear);

    if(filtered.length === 0){ container.innerHTML = "<p>No records found</p>"; return; }

    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    const table = document.createElement('table');
    const thead = document.createElement('thead');
    const trHead = document.createElement('tr');
    ["Number","Name","Mobile","Year", ...months, "Jama","Baki","Advance"].forEach(h=>{
        const th = document.createElement('th'); th.textContent = h; trHead.appendChild(th);
    });
    thead.appendChild(trHead); table.appendChild(thead);

    const tbody = document.createElement('tbody');
    filtered.forEach(row=>{
        const tr = document.createElement('tr');
        tr.appendChild(td(row.Number));
        tr.appendChild(td(row.Name));
        tr.appendChild(td(row.Mobile));
        tr.appendChild(td(row.Year));
        months.forEach(m => tr.appendChild(td(row[m] || "")));
        tr.appendChild(td(row.Jama || ""));
        tr.appendChild(td(row.Baki || ""));
        tr.appendChild(td(row.Advance || ""));
        tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    container.appendChild(table);
}

function td(val){ const cell = document.createElement('td'); cell.textContent = val; return cell; }

// Home button
function goHome(){
    window.location.href = "index.html"; // या अपनी home page का URL डालें
}
</script>

</body>
</html>
